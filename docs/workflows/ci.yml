# Backup copy of .github/workflows/ci.yml
name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,web,live]'
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q
      - name: 300-loop validation
        run: |
          mkdir -p artifacts
          python -m crypto_auto_trade.cli validate --iterations 300 --trailing-stop-pct 0.05 > artifacts/validation.json
      - name: Best strategy artifact
        run: python -m crypto_auto_trade.cli best-strategy --iterations 300 --trailing-stop-pct 0.05 > artifacts/best-strategy.json
      - name: Sample 5Y simulation artifact
        run: python -m crypto_auto_trade.cli simulate-five-years --coin-ids bitcoin,ethereum --strategy-limit 10 --trailing-stop-pct 0.05 --output-dir artifacts/simulation
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: crypto-auto-trade-ci-${{ matrix.python-version }}
          path: artifacts/**/*.json
