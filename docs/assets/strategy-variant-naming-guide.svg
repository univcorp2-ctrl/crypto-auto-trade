<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><rect width="1280" height="720" rx="34" fill="#07111f"/><text x="56" y="78" fill="#fff" font-family="Arial" font-size="42" font-weight="800">戦略名の読み方</text><text x="58" y="116" fill="#9eb8c7" font-family="Arial" font-size="21">名前を見るだけで、何の設定違いか分かるようにしている</text><g font-family="Arial"><rect x="80" y="165" width="1120" height="95" rx="22" fill="#102a3a" stroke="#58c7ff"/><text x="115" y="225" fill="#fff" font-size="34" font-weight="800">ema_cross_f5_s34</text><text x="500" y="225" fill="#9eb8c7" font-size="22">f5 = fast EMA 5 / s34 = slow EMA 34</text><rect x="80" y="295" width="1120" height="95" rx="22" fill="#102a3a" stroke="#ffd166"/><text x="115" y="355" fill="#fff" font-size="34" font-weight="800">donchian_l55_p100</text><text x="540" y="355" fill="#9eb8c7" font-size="22">l55 = lookback 55 / p100 = position 100%</text><rect x="80" y="425" width="1120" height="95" rx="22" fill="#102a3a" stroke="#c792ff"/><text x="115" y="485" fill="#fff" font-size="34" font-weight="800">rsi_rev_e30_x50_p50</text><text x="585" y="485" fill="#9eb8c7" font-size="22">e30 = entry / x50 = exit / p50 = position</text><rect x="80" y="555" width="1120" height="95" rx="22" fill="#102a3a" stroke="#ff6b6b"/><text x="115" y="615" fill="#fff" font-size="34" font-weight="800">bollinger_w20_m2p0_p75</text><text x="665" y="615" fill="#9eb8c7" font-size="22">w20 = window / m2.0 = band / p75 = position</text></g></svg>
