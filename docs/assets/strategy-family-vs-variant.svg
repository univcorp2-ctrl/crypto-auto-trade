<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620"><rect width="1280" height="620" rx="34" fill="#07111f"/><text x="60" y="80" fill="#fff" font-family="Arial" font-size="42" font-weight="800">Family と Variant の違い</text><text x="62" y="118" fill="#9eb8c7" font-family="Arial" font-size="21">Familyはロジックの考え方、Variantは設定値違い</text><g font-family="Arial"><rect x="90" y="170" width="470" height="320" rx="28" fill="#102a3a" stroke="#58c7ff" stroke-width="3"/><text x="135" y="225" fill="#fff" font-size="32" font-weight="800">Family</text><text x="135" y="270" fill="#9eb8c7" font-size="21">勝ち方の考え方</text><text x="135" y="320" fill="#58c7ff" font-size="22" font-weight="700">例: EMA Cross</text><text x="135" y="360" fill="#d8f6ff" font-size="19">短期EMAが長期EMAを上回ったら買う</text><text x="135" y="395" fill="#d8f6ff" font-size="19">トレンドに乗る順張り</text><rect x="720" y="170" width="470" height="320" rx="28" fill="#102a3a" stroke="#56f39a" stroke-width="3"/><text x="765" y="225" fill="#fff" font-size="32" font-weight="800">Variant</text><text x="765" y="270" fill="#9eb8c7" font-size="21">同じ考え方の設定違い</text><text x="765" y="320" fill="#56f39a" font-size="22" font-weight="700">例: ema_cross_f5_s34</text><text x="765" y="360" fill="#d8f6ff" font-size="19">fast EMA = 5</text><text x="765" y="395" fill="#d8f6ff" font-size="19">slow EMA = 34</text><text x="765" y="430" fill="#d8f6ff" font-size="19">反応が速い調整版</text></g><path d="M585 330 C630 300 665 300 710 330" fill="none" stroke="#9ee7ff" stroke-width="6"/><text x="592" y="285" fill="#9ee7ff" font-family="Arial" font-size="20" font-weight="700">設定値を変える</text></svg>
