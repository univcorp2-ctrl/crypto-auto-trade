<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520"><rect width="1280" height="520" rx="30" fill="#07111f"/><text x="56" y="72" fill="#fff" font-family="Arial" font-size="42" font-weight="800">Mandatory Trailing Stop</text><text x="58" y="108" fill="#9eb8c7" font-family="Arial" font-size="20">一度ポジションを取ったら、最高値から一定割合下に出口ラインを置く</text><polyline points="90,410 190,360 280,310 380,330 500,240 620,260 760,165 910,200 1050,120 1170,210" fill="none" stroke="#56f39a" stroke-width="7"/><polyline points="90,455 190,407 280,361 380,361 500,285 620,285 760,198 910,198 1050,145 1170,145" fill="none" stroke="#ff6b6b" stroke-width="5" stroke-dasharray="10 8"/><circle cx="90" cy="410" r="12" fill="#58c7ff"/><text x="70" y="390" fill="#58c7ff" font-family="Arial" font-size="18" font-weight="700">BUY</text><circle cx="1170" cy="210" r="12" fill="#ff6b6b"/><text x="1110" y="245" fill="#ff6b6b" font-family="Arial" font-size="18" font-weight="700">STOP EXIT</text><text x="760" y="145" fill="#fff" font-family="Arial" font-size="18">Peak updates</text><text x="470" y="305" fill="#ffb3b3" font-family="Arial" font-size="18">Trailing stop follows peak</text><rect x="70" y="140" width="470" height="88" rx="18" fill="#102a3a" stroke="#244d63"/><text x="100" y="177" fill="#fff" font-family="Arial" font-size="22" font-weight="800">例: trailing_stop_pct = 5%</text><text x="100" y="207" fill="#9eb8c7" font-family="Arial" font-size="18">最高値が120なら stop は 114</text></svg>
