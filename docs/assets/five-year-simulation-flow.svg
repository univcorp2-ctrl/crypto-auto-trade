<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720"><rect width="1280" height="720" rx="34" fill="#07111f"/><text x="56" y="78" fill="#fff" font-family="Arial" font-size="44" font-weight="800">5年バックテスト + 未来5年シナリオ</text><text x="58" y="116" fill="#9eb8c7" font-family="Arial" font-size="21">未来価格は存在しないため、予言ではなくシナリオ型フォワード・シミュレーションとして扱う</text><g font-family="Arial"><rect x="70" y="180" width="250" height="120" rx="22" fill="#102a3a" stroke="#58c7ff"/><text x="100" y="225" fill="#fff" font-size="24" font-weight="800">Past 5Y</text><text x="100" y="260" fill="#9eb8c7" font-size="18">historical candles</text><rect x="380" y="180" width="250" height="120" rx="22" fill="#102a3a" stroke="#56f39a"/><text x="410" y="225" fill="#fff" font-size="24" font-weight="800">Backtest</text><text x="410" y="260" fill="#9eb8c7" font-size="18">100+ strategies</text><rect x="690" y="180" width="250" height="120" rx="22" fill="#102a3a" stroke="#ffd166"/><text x="720" y="225" fill="#fff" font-size="24" font-weight="800">Forward Split</text><text x="720" y="260" fill="#9eb8c7" font-size="18">train vs later data</text><rect x="1000" y="180" width="220" height="120" rx="22" fill="#102a3a" stroke="#c792ff"/><text x="1030" y="225" fill="#fff" font-size="24" font-weight="800">Best</text><text x="1030" y="260" fill="#9eb8c7" font-size="18">candidate</text><rect x="125" y="430" width="220" height="110" rx="22" fill="#081927" stroke="#ff6b6b"/><text x="165" y="475" fill="#fff" font-size="22" font-weight="800">Bear</text><text x="165" y="507" fill="#9eb8c7" font-size="17">downside</text><rect x="400" y="430" width="220" height="110" rx="22" fill="#081927" stroke="#58c7ff"/><text x="440" y="475" fill="#fff" font-size="22" font-weight="800">Base</text><text x="440" y="507" fill="#9eb8c7" font-size="17">normal</text><rect x="675" y="430" width="220" height="110" rx="22" fill="#081927" stroke="#56f39a"/><text x="715" y="475" fill="#fff" font-size="22" font-weight="800">Bull</text><text x="715" y="507" fill="#9eb8c7" font-size="17">upside</text><rect x="950" y="430" width="220" height="110" rx="22" fill="#081927" stroke="#ffd166"/><text x="990" y="475" fill="#fff" font-size="22" font-weight="800">Shock</text><text x="990" y="507" fill="#9eb8c7" font-size="17">high volatility</text></g><g stroke="#9ee7ff" stroke-width="5" opacity=".8"><line x1="320" y1="240" x2="380" y2="240"/><line x1="630" y1="240" x2="690" y2="240"/><line x1="940" y1="240" x2="1000" y2="240"/><line x1="1110" y1="300" x2="235" y2="430"/><line x1="1110" y1="300" x2="510" y2="430"/><line x1="1110" y1="300" x2="785" y2="430"/><line x1="1110" y1="300" x2="1060" y2="430"/></g><text x="100" y="640" fill="#56f39a" font-family="Arial" font-size="22" font-weight="700">未来5年は実データではなく、過去分布から作る耐久シナリオ。全ケースでtrailing stopを適用。</text></svg>
