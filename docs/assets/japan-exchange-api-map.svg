<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620"><rect width="1280" height="620" rx="30" fill="#07111f"/><text x="56" y="76" fill="#fff" font-family="Arial" font-size="42" font-weight="800">Japan Exchange API Registry</text><text x="58" y="112" fill="#9eb8c7" font-family="Arial" font-size="20">JVCEA first-class members are tracked, API-ready venues are separated from manual-review venues</text><g font-family="Arial"><rect x="70" y="160" width="250" height="110" rx="18" fill="#102a3a" stroke="#56f39a"/><text x="95" y="199" fill="#fff" font-size="23" font-weight="700">API Ready</text><text x="95" y="232" fill="#9eb8c7" font-size="17">bitFlyer / bitbank</text><text x="95" y="258" fill="#9eb8c7" font-size="17">GMO / Coincheck</text><rect x="360" y="160" width="250" height="110" rx="18" fill="#102a3a" stroke="#58c7ff"/><text x="385" y="199" fill="#fff" font-size="23" font-weight="700">CCXT Path</text><text x="385" y="232" fill="#9eb8c7" font-size="17">Binance / Gate</text><text x="385" y="258" fill="#9eb8c7" font-size="17">bitFlyer / bitbank</text><rect x="650" y="160" width="250" height="110" rx="18" fill="#102a3a" stroke="#ffd166"/><text x="675" y="199" fill="#fff" font-size="23" font-weight="700">Candidate</text><text x="675" y="232" fill="#9eb8c7" font-size="17">Zaif / BTCBOX</text><text x="675" y="258" fill="#9eb8c7" font-size="17">OKCoin Japan</text><rect x="940" y="160" width="250" height="110" rx="18" fill="#102a3a" stroke="#ff6b6b"/><text x="965" y="199" fill="#fff" font-size="23" font-weight="700">Manual Review</text><text x="965" y="232" fill="#9eb8c7" font-size="17">No public trading API</text><text x="965" y="258" fill="#9eb8c7" font-size="17">or derivatives only</text><rect x="170" y="350" width="940" height="150" rx="24" fill="#081927" stroke="#244d63"/><text x="220" y="395" fill="#fff" font-size="28" font-weight="800">Design rule</text><text x="220" y="435" fill="#9eb8c7" font-size="20">Public data can be called through registered adapters.</text><text x="220" y="468" fill="#9eb8c7" font-size="20">Private trading is blocked unless secrets + live ACK exist.</text><text x="220" y="505" fill="#56f39a" font-size="20" font-weight="700">Unknown venues are not faked; they stay manual_review until verified.</text></g></svg>
